openapi: 3.0.3
info:
  title: AskMeInsurance Shared API Contract
  version: 1.0.0
  description: Shared contract for frontend and backend integration.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: conversations
  - name: chat
  - name: forms
paths:
  /conversations:
    get:
      tags: [conversations]
      summary: List conversations
      operationId: listConversations
      responses:
        '200':
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [conversations]
      summary: Create conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
      responses:
        '201':
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /conversations/{conversation_id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [conversations]
      summary: Get one conversation
      operationId: getConversation
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [conversations]
      summary: Delete conversation
      operationId: deleteConversation
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /conversations/{conversation_id}/messages:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [conversations]
      summary: List conversation messages
      operationId: listConversationMessages
      responses:
        '200':
          description: Conversation messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationMessage'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /chat/stream:
    post:
      tags: [chat]
      summary: Stream chat response via SSE
      description: |
        Returns Server-Sent Events with event names `meta`, `chunk`, `form_requested`, and `done`.
      operationId: streamChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE stream. Each event uses:
                  - event: meta          data: ChatMetaEventData
                  - event: chunk         data: ChatChunkEventData
                  - event: form_requested data: FormRequestWire
                  - event: done          data: ChatDoneEventData
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /forms:
    get:
      tags: [forms]
      summary: List forms
      operationId: listForms
      parameters:
        - name: conversation_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Form list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Form'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /forms/{form_id}:
    parameters:
      - $ref: '#/components/parameters/FormId'
    get:
      tags: [forms]
      summary: Get one form
      operationId: getForm
      responses:
        '200':
          description: Form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /forms/{form_id}/submit:
    parameters:
      - $ref: '#/components/parameters/FormId'
    post:
      tags: [forms]
      summary: Submit form fields
      operationId: submitForm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormSubmitRequest'
      responses:
        '200':
          description: Updated form
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Form'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FormId:
      name: form_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ConversationCreateRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1

    Conversation:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationMessage:
      type: object
      additionalProperties: false
      required:
        - id
        - conversation_id
        - role
        - content
        - created_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, bot]
        content:
          type: string
        created_at:
          type: string
          format: date-time

    ChatStreamRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
        conversation_id:
          type: string
          format: uuid
          nullable: true

    ChatMetaEventData:
      type: object
      additionalProperties: false
      required:
        - conversation_id
        - model
        - user_present
      properties:
        conversation_id:
          type: string
          format: uuid
          nullable: true
        model:
          type: string
        user_present:
          type: boolean

    ChatChunkEventData:
      type: object
      additionalProperties: false
      required:
        - text
      properties:
        text:
          type: string

    ChatDoneEventData:
      type: object
      additionalProperties: false
      required:
        - reason
      properties:
        reason:
          type: string

    Form:
      type: object
      additionalProperties: false
      required:
        - id
        - conversation_id
        - status
        - fields
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, submitted]
        fields:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FormSubmitRequest:
      type: object
      additionalProperties: false
      required:
        - fields
      properties:
        fields:
          type: object
          additionalProperties: true

    FormOption:
      type: object
      additionalProperties: false
      required:
        - label
        - value
      properties:
        label:
          type: string
        value:
          type: string

    FormField:
      type: object
      additionalProperties: false
      required:
        - id
        - label
        - type
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, select, radio, checkbox]
        required:
          type: boolean
        placeholder:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/FormOption'

    FormPage:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - fields
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'

    FormRequestWire:
      type: object
      additionalProperties: false
      required:
        - form_id
        - conversation_id
        - title
        - pages
      properties:
        form_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        submit_label:
          type: string
        pages:
          type: array
          items:
            $ref: '#/components/schemas/FormPage'

    ErrorBody:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        detail:
          nullable: true

    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
