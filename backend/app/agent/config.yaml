# --- Provider reference ---
# openrouter → openrouter|<provider>/<model>   e.g. openrouter|anthropic/claude-3-5-sonnet  (needs OPENROUTER_API_KEY)
# google     → google|<model>                  e.g. google|gemini-2.5-flash-lite             (needs GEMINI_API_KEY)
# openai     → openai|<model>                  e.g. openai|gpt-4o-mini                       (needs OPENAI_API_KEY)
# --------------------------

